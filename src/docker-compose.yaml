version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: todolist-db
    environment:
      POSTGRES_DB: todolist
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: todopass
    ports:
      - "5252:5252"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
