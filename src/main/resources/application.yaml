server:
  port: 8042

app:
  name: Todo List Manager
  version: 1.0.0

logging:
  level:
    com.mipt.sem2.hw1.todolist: DEBUG

---
spring:
  config:
    activate:
      on-profile: dev
logging:
  level:
    com.mipt.sem2.hw1.todolist: DEBUG
    org.springframework: INFO
app:
  name: Todo List Manager DEV

---
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    com.mipt.sem2.hw1.todolist: WARN
servlet:
  multipart:
    max-file-size: 10MB
    max-request-size: 10MB
mvc:
  throw-exception-if-no-handler-found: true
web:
  resources:
    add-mappings: false


---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

spring:
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
  flyway:
    enabled: true
    baseline-on-migrate: true

api:
  version: 2.0.0